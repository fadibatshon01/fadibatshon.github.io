<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <!-- Navy rounded square base -->
  <rect width="64" height="64" rx="10" fill="#1b3454"/>

  <!-- Sky 'bottom line' accent -->
  <line x1="14" y1="50" x2="50" y2="50" stroke="#5aafd4" stroke-width="2" stroke-linecap="round"/>

  <!-- F | B serif wordmark -->
  <text x="20" y="42"
        font-family="Georgia, 'Cormorant Garamond', 'Times New Roman', serif"
        font-size="30" font-weight="700"
        fill="#ffffff" text-anchor="middle">F</text>

  <line x1="32" y1="20" x2="32" y2="42" stroke="#5aafd4" stroke-width="1.5" stroke-linecap="round"/>

  <text x="44" y="42"
        font-family="Georgia, 'Cormorant Garamond', 'Times New Roman', serif"
        font-size="30" font-weight="700"
        fill="#ffffff" text-anchor="middle">B</text>
</svg>
