<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">

  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#1b3454"/>

  <!-- Sky-blue top accent bar -->
  <rect x="0" y="0" width="64" height="4" rx="2" fill="#5aafd4"/>

  <!-- "fb" lettermark — f in white, b in sky blue -->
  <text
    x="32" y="48"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="40"
    font-weight="700"
    letter-spacing="-2">
    <tspan fill="#ffffff">f</tspan><tspan fill="#5aafd4">b</tspan>
  </text>

</svg>
