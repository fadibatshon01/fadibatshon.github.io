          <svg class="arch-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

                <option value="07">Jul</option>
                <option value="08">Aug</option>
                <option value="09">Sep</option>
                <option value="10">Oct</option>
                <option value="11">Nov</option>
                <option value="12">Dec</option>
              </select>
              <select id="archToYear" class="arch-pick" aria-label="To year">

            </div>
          </div>
          <div class="arch-status">
            <p class="arch-count" id="archCount" aria-live="polite"></p>
            <button type="button" class="arch-reset" id="archReset" hidden>
              <span class="arch-reset-x" aria-hidden="true">×</span> Clear filters

          </div>
        </div>

      <div id="postList" class="post-list" aria-live="polite">

  <script src="../../script.js"></script>
  <script>
    (async function () {
      const listEl = document.getElementById('postList');

      const fmtDate = (iso) => {
        const d = new Date(iso + 'T00:00:00');
        if (isNaN(d)) return iso;
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      };

      const searchEl       = document.getElementById('archSearch');
      const fromMonthEl    = document.getElementById('archFromMonth');
      const fromYearEl     = document.getElementById('archFromYear');
      const toMonthEl      = document.getElementById('archToMonth');
      const toYearEl       = document.getElementById('archToYear');
      const countEl        = document.getElementById('archCount');
      const emptyEl        = document.getElementById('archEmpty');
      const clearEl        = document.getElementById('archClear');
      const resetBtn       = document.getElementById('archReset');

      let posts = [];
      let activeSearch = '';

      try {
        const res = await fetch('../posts.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error('posts.json unavailable');
        posts = await res.json();
        posts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

        if (!posts.length) {
          listEl.innerHTML = '<p class="post-empty">No pieces yet.</p>';
          return;
        }

        // Render all post rows (filter via display, not re-render)
        listEl.innerHTML = posts.map((p, i) => `
          <article class="post-row" data-idx="${i}">
            <a class="post-row-link" href="../post/?slug=${encodeURIComponent(p.slug)}">
              <span class="post-row-no" aria-hidden="true">${String(posts.length - i).padStart(2,'0')}</span>
              <div class="post-row-main">
                <div class="post-row-top">
                  <time class="post-date" datetime="${p.date}">${fmtDate(p.date)}</time>
                  ${(p.tags || []).map(t => `<span class="post-tag">${t}</span>`).join('')}
                </div>
                <h3 class="post-row-title">${p.title}</h3>
                <p class="post-row-excerpt">${p.excerpt || ''}</p>
              </div>
              <span class="post-row-arr" aria-hidden="true">→</span>
            </a>
          </article>
        `).join('');

        // Populate year selects with years that have posts (oldest → newest)
        const postYears = [...new Set(posts.map(p => (p.date || '').slice(0, 4)).filter(Boolean))].sort();
        postYears.forEach(y => {
          const o1 = document.createElement('option');
          o1.value = y; o1.textContent = y;
          fromYearEl.appendChild(o1);
          const o2 = document.createElement('option');
          o2.value = y; o2.textContent = y;
          toYearEl.appendChild(o2);
        });

        function boundary(monthSel, yearSel, side) {
          const m = monthSel.value;
          const y = yearSel.value;
          if (!y) return '';                                   // no year → no constraint
          if (!m) return side === 'from' ? `${y}-01` : `${y}-12`; // year only → full year edge
          return `${y}-${m}`;
        }

        function updateBounds() {
          // Disable year options that would create an invalid range
          const fy = fromYearEl.value;
          const ty = toYearEl.value;
          Array.from(toYearEl.options).forEach(opt => {
            opt.disabled = !!(opt.value && fy && opt.value < fy);
          });
          Array.from(fromYearEl.options).forEach(opt => {
            opt.disabled = !!(opt.value && ty && opt.value > ty);
          });
        }

        function isAnyFilterActive() {
          return !!(activeSearch || fromMonthEl.value || fromYearEl.value || toMonthEl.value || toYearEl.value);
        }

        function applyFilters() {
          const fromB = boundary(fromMonthEl, fromYearEl, 'from');
          const toB   = boundary(toMonthEl,   toYearEl,   'to');
          const rows = listEl.querySelectorAll('.post-row');
          let visible = 0;
          rows.forEach(row => {
            const post = posts[Number(row.dataset.idx)];
            const postMonth = (post.date || '').slice(0, 7);
            const fromMatch = !fromB || postMonth >= fromB;
            const toMatch   = !toB   || postMonth <= toB;
            const haystack = [post.title, post.excerpt, ...(post.tags || [])].join(' ').toLowerCase();
            const searchMatch = !activeSearch || haystack.includes(activeSearch);
            const match = fromMatch && toMatch && searchMatch;
            row.classList.toggle('arch-hidden', !match);
            if (match) visible++;
          });
          countEl.textContent = `Showing ${visible} of ${posts.length}`;
          emptyEl.hidden = visible !== 0;
          resetBtn.hidden = !isAnyFilterActive();
        }

        function resetFilters() {
          activeSearch = '';
          searchEl.value = '';
          fromMonthEl.value = ''; fromYearEl.value = '';
          toMonthEl.value = '';   toYearEl.value = '';
          updateBounds();
          applyFilters();
        }

        [fromMonthEl, fromYearEl, toMonthEl, toYearEl].forEach(el => {
          el.addEventListener('change', () => {
            updateBounds();
            applyFilters();
          });
        });

        searchEl.addEventListener('input', e => {
          activeSearch = e.target.value.trim().toLowerCase();
          applyFilters();
        });

        resetBtn.addEventListener('click', () => {
          resetFilters();
          searchEl.focus();
        });

        clearEl.addEventListener('click', e => {
          e.preventDefault();
          resetFilters();
          searchEl.focus();
        });

        applyFilters();
      } catch (err) {
        listEl.innerHTML = `<p class="post-error">Couldn't load posts. If you're viewing this from a <code>file://</code> URL, run a local server (e.g. <code>python3 -m http.server</code>).</p>`;
        console.error(err);
      }
    })();
  </script>
