  <script src="../script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const slug = (params.get('slug') || '').replace(/[^a-z0-9-_]/gi, '');
      const titleEl = document.getElementById('postTitle');
      const metaEl  = document.getElementById('postMeta');
      const bodyEl  = document.getElementById('postBody');

      if (!slug) {
        titleEl.textContent = 'Post not found';
        bodyEl.innerHTML = '<p>No post slug provided. <a href="./">Back to all writing</a>.</p>';
        return;
      }

      try {
        const manifestRes = await fetch('./posts.json', { cache: 'no-cache' });
        if (!manifestRes.ok) throw new Error('posts.json unavailable');
        const posts = await manifestRes.json();
        const meta = posts.find(p => p.slug === slug);
        if (!meta) {
          titleEl.textContent = 'Post not found';
          bodyEl.innerHTML = '<p>That post doesn\'t exist. <a href="./">Back to all writing</a>.</p>';
          return;
        }

        const mdRes = await fetch(`./posts/${slug}.md`, { cache: 'no-cache' });
        if (!mdRes.ok) throw new Error('post file unavailable');
        const md = await mdRes.text();

        const fmtDate = (iso) => {
          const d = new Date(iso + 'T00:00:00');
          if (isNaN(d)) return iso;
          return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        };

        const stripFirstH1 = (s) => s.replace(/^\s*#\s+.+\n+/, '');
        const html = marked.parse(stripFirstH1(md));

        document.title = `${meta.title} — The Bottom Line`;
        titleEl.textContent = meta.title;
        const tagBits = (meta.tags || []).map(t => `<span class="post-tag">${t}</span>`).join('');
        metaEl.innerHTML = `<time datetime="${meta.date}">${fmtDate(meta.date)}</time>${tagBits ? ' &nbsp;·&nbsp; ' + tagBits : ''}`;
        bodyEl.innerHTML = html;
      } catch (err) {
        titleEl.textContent = 'Couldn\'t load post';
        bodyEl.innerHTML = `<p>Something went wrong. If you're viewing this from a <code>file://</code> URL, run a local server (e.g. <code>python3 -m http.server</code>).</p>`;
        console.error(err);
      }
    })();
  </script>
